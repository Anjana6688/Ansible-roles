- name: create ec2 and r53
  hosts: localServer
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-04eb2974139741695 # replace with your SG ID
    zone_id: "Z100354714Q7Y7MA4LCQB" # replace with your ID
    domain_name: "anjana.fun"
    # we can pass instances through command line using -e
    instances: 
     - mongodb
     - redis
    # - mysql
     # - rabbitmq
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"  # to refer loop keyword we use item.
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output # to store the output we use register


  # - name: print the ec2_output
  #   ansible.builtin.debug:
  #     msg: "{{ ec2_output }}"
  
  # - name: print public_ip
  #   ansible.builtin.debug: 
  #     msg: "{{ item.instances[0].public_ip_address }}" # if we need to print single iteam in a loop
  #   loop: "{{ ec2_output.results }}"

  # - name: print private_ip
  #   ansible.builtin.debug: 
  #     msg: "{{ item.instances[0].private_ip_address }}"
  #   loop: "{{ ec2_output.results }}"

  - name: create route53 record
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"  # from ansible doc anjana.fun
      record: "{{ item.item }}.{{ domain_name }}" # mongodb.anjana.fun
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}" # reference from ec2_output.json
      overwrite: true
    loop: "{{ ec2_output.results }}"

